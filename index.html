<body>
    <header>
        <nav class="top-nav">
            <a href="#">Gmail</a>

            </button>
            <button class="profile-btn" aria-label="Google Account">
                <img src="https://lh3.googleusercontent.com/a/default-user=s32-c" alt="Profile">
            </button>
        </nav>
    </header>

    <main>
        <div class="logo-container">
            <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google">
        </div>
        
        <div class="search-container">
            <div class="search-bar">
                <div class="search-icon">
                    <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                </div>
                <input type="text" class="search-input" aria-label="Search" title="Search">
                <div class="mic-icon">
                   <svg focusable="false" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="#4285f4" d="m12 15c1.66 0 3-1.31 3-2.97v-7.02c0-1.66-1.34-3.01-3-3.01s-3 1.34-3 3.01v7.02c0 1.66 1.34 2.97 3 2.97z"></path><path fill="#34a853" d="m11 18.08h2v3.92h-2z"></path><path fill="#fbbc05" d="m7.05 16.87c-1.27-1.33-2.05-2.83-2.05-4.87h2c0 1.45 0.56 2.42 1.47 3.38v0.32l-1.15 1.18z"></path><path fill="#ea4335" d="m12 16.93a4.97 5.25 0 0 1 -3.54 -1.55l-1.41 1.49c1.26 1.34 3.02 2.13 4.95 2.13 3.87 0 6.99-2.92 6.99-7h-1.99c0 2.92-2.24 4.93-5 4.93z"></path></svg>
                </div>
                <div class="camera-icon">
                    <svg focusable="false" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg"><rect fill="none" height="192" width="192"></rect><g><circle cx="144" cy="144" fill="#34a853" r="16"></circle><circle cx="96" cy="104" fill="#4285f4" r="24"></circle><path d="M24,136v26H0v-26c0-13.255,10.745-24,24-24h26v24H24z" fill="#ea4335"></path><path d="M24,56V30h26V6H24C10.745,6,0,16.745,0,30v26H24z" fill="#fbbc05"></path><path d="M168,56V30c0-13.255-10.745-24-24-24h-26v24h26v26H168z" fill="#4285f4"></path><path d="M96,168H60v24h36V168z" fill="#34a853"></path></g></svg>
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="btn">Google Search</button>
                <button class="btn">I'm Feeling Lucky</button>
            </div>
            
            <div class="language-offer">
                Google offered in: <a href="#">हिन्दी</a> <a href="#">বাংলা</a> <a href="#">తెలుగు</a> <a href="#">मराठी</a> <a href="#">தமிழ்</a> <a href="#">ગુજરાતી</a> <a href="#">ಕನ್ನಡ</a> <a href="#">മലയാളം</a> <a href="#">ਪੰਜਾਬੀ</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-top">
            <p>India</p>
        </div>
        <div class="footer-bottom">
            <div class="footer-links-left">
                <a href="#">About</a>
                <a href="#">Advertising</a>
                <a href="#">Business</a>
                <a href="#">How Search works</a>
            </div>
            <div class="footer-links-right">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Settings</a>
            </div>
        </div>
    </footer>

</html>
